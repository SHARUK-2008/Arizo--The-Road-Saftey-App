name: arizo
description: GuardianDrive — near-miss detector with map replay, crash footage, cognitive load monitor and emergency SMS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # Sensors & GPS
  sensors_plus: ^4.0.2
  geolocator: ^13.0.4

  # Mesh networking
  nearby_connections: ^4.1.0

  # Camera & Video
  camera: ^0.10.5+9
  video_player: ^2.8.6

  # Permissions
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  lottie: ^3.3.3

  # URL Launcher
  url_launcher: ^6.3.2

  # SMS
  sms_sender: ^1.0.6

  # Storage
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2+1

  # ML Kit
  google_mlkit_face_detection: ^0.11.1
  google_mlkit_commons: ^0.8.1

  # Audio
  audioplayers: ^6.0.0

  # ── NEW: Voice / Speech ────────────────────────────────────────
  speech_to_text: ^7.0.0
  # ──────────────────────────────────────────────────────────────

  # Utilities
  path_provider: ^2.1.3
  uuid: ^4.4.0
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/alarm.mp3
    - assets/icon/ic_launcher.png